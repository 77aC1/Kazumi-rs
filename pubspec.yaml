name: Kazumi
publish_to: 'none'
version: 0.8.0+100

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  get: ^4.7.2
  dio: ^5.9.2
  hive_ce: ^2.11.2
  hive_ce_flutter: ^2.2.2
  path_provider: ^2.1.5
  url_launcher: ^6.3.1
  package_info_plus: ^8.3.1
  window_manager: ^0.5.1
  media_kit: ^1.1.12
  media_kit_video: ^1.2.6
  media_kit_libs_android_video: ^1.3.6
  media_kit_libs_ios_video: ^1.1.4
  media_kit_libs_macos_video: ^1.1.4
  media_kit_libs_windows_video: ^1.0.10
  media_kit_libs_linux: ^1.1.3
  ffi: ^2.1.4
  xpath_selector_html_parser: ^2.1.0
  html: ^0.15.5
  webview_flutter: ^4.10.0
  sqflite: ^2.4.2+1
  flutter_foreground_task: ^9.2.2
  audio_service: ^0.18.18
  audio_session: ^0.2.3
  equatable: ^2.0.8
  intl: ^0.20.2
  connectivity_plus: ^6.1.5
  safe_local_storage: ^2.0.3
  tray_manager: ^0.5.2
  upgrader: ^12.5.0
  scrollview_observer: ^1.26.3
  image_picker: ^1.2.2
  file_picker: ^10.3.10
  record_use: ^0.6.0
  screen_brightness: ^2.1.2
  wakelock_plus: ^1.3.3
  flutter_native_splash: ^2.4.7
  flutter_displaymode: ^0.6.0
  saver_gallery: ^4.1.1
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_ce_generator: ^1.11.1
  build_runner: ^2.15.0
  
flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/logo/
    - assets/fonts/
    - assets/shaders/
    - assets/plugins/
    - assets/statements/
    - assets/linux/
  fonts:
    - family: MiSans
      fonts:
        - asset: assets/fonts/MiSans-Regular.ttf
